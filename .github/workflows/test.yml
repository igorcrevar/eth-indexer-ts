name: Unit Tests

on:
  push:
    branches: ["**"]
    paths:
      - "**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "**"
      - ".github/workflows/test.yml"

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --run
